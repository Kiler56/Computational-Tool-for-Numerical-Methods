{% extends "base.html" %}
{% block title %}Login — NumCalc{% endblock %}

{% block content %}
<section class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">🔐</span>
            <h1 data-i18n="login_title">Iniciar Sesión</h1>
        </div>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" class="auth-form" id="login-form">
            <div class="form-group">
                <label for="email" data-i18n="email_label">Correo electrónico</label>
                <input type="email" id="email" name="email" value="{{ email|default('') }}" required autocomplete="email" placeholder="usuario@ejemplo.com">
            </div>

            <div class="form-group">
                <label for="password" data-i18n="password_label">Contraseña</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary btn-block" data-i18n="btn_login">Entrar</button>
        </form>

        <p class="auth-footer-link">
            <span data-i18n="no_account">¿No tienes cuenta?</span>
            <a href="/register" data-i18n="register">Crear Cuenta</a>
        </p>
    </div>
</section>
{% endblock %}
