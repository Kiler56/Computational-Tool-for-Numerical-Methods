{% extends "base.html" %}
{% block title %}Registro — NumCalc{% endblock %}

{% block content %}
<section class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">📝</span>
            <h1 data-i18n="register_title">Crear Cuenta</h1>
        </div>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" class="auth-form" id="register-form">
            <div class="form-group">
                <label for="username" data-i18n="username_label">Nombre de usuario</label>
                <input type="text" id="username" name="username" value="{{ username|default('') }}" required autocomplete="username" placeholder="tu_usuario">
            </div>

            <div class="form-group">
                <label for="email" data-i18n="email_label">Correo electrónico</label>
                <input type="email" id="email" name="email" value="{{ email|default('') }}" required autocomplete="email" placeholder="usuario@ejemplo.com">
            </div>

            <div class="form-group">
                <label for="password" data-i18n="password_label">Contraseña</label>
                <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Mínimo 4 caracteres">
            </div>

            <div class="form-group">
                <label for="confirm_password" data-i18n="confirm_password_label">Confirmar contraseña</label>
                <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password" placeholder="Repite tu contraseña">
            </div>

            <button type="submit" class="btn btn-primary btn-block" data-i18n="btn_register">Registrarse</button>
        </form>

        <p class="auth-footer-link">
            <span data-i18n="has_account">¿Ya tienes cuenta?</span>
            <a href="/login" data-i18n="login">Iniciar Sesión</a>
        </p>
    </div>
</section>
{% endblock %}
